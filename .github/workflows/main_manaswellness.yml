# Build & Deploy Next.js app to Azure App Service (Linux)
name: ManasWellness Landing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # These are used at build time if your server code is evaluated during build
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

    steps:      
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Cache node_modules
        uses: actions/cache@v3.4.3
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashfiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      
      - name: Cache Next.js Build (Build Cache)
        uses: actions/cache@v3.4.3
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Create .env.production.local for Next.js build
        run: |
          {
            echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}"
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
            echo "NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}"
          } > .env.production.local

      - name: Install Dependencies (Use cache if available)
        run: npm install
        if: steps.npm-cache.outputs.cache-hit != 'true'

      - name: Build Next.js app with standalone output
        run: npm run build

      - name: Copy static and runtime files to standalone folder
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          [ -f .env.production ] && cp .env.production .next/standalone/.env.production || true
          echo "Debug Deployment Package:"
          find .next/standalone

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'manaswellness'
          slot-name: 'Production'
          package: .next/standalone
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_329EE5FB4C2C43398C76EDE16631A9CB }}
